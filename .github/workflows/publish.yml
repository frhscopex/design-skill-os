# Design Skill OS - Ultimate Multi-Registry Release Pipeline
name: 🚀 Global Publish (NPM + GitHub)

on:
  release:
    types: [published]

jobs:
  publish-npm:
    name: 📦 Publish to NPM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - name: 🚀 Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github:
    name: 🎨 Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://npm.pkg.github.com'
          scope: '@frhscopex'
      - run: npm install
      - name: 🚀 Publish to GitHub
        run: |
          # Change the package name temporarily to include the org scope for GitHub
          npm pkg set name=@frhscopex/design-skill-os
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
